<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ site_title }}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
{% block head %}{% endblock %}
</head>
<body>

<nav class="topbar">
    <a href="/" class="brand">{{ site_title }}</a>
    {% for c in courses %}
    <a href="/{{ c.slug }}/"
       class="{% if course is defined and course.slug == c.slug %}current{% endif %}"
    >{{ c.title }}</a>
    {% endfor %}
</nav>

{% block content %}{% endblock %}

<footer class="footer">
    {{ site_title }} · {{ site_subtitle }}
</footer>

<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
